<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洪荒五行MUD - 在线正式服</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 更新弹窗 -->
<div id="updateModal" class="modal">
  <div class="modal-box">
    <div class="title">发现游戏更新</div>
    <div id="updateLog">正在更新，请稍候...</div>
    <button onclick="location.reload()">立即更新</button>
  </div>
</div>

<!-- 登录注册弹窗 -->
<div id="loginModal" class="modal" style="display:flex">
  <div class="modal-box">
    <div class="title">账号登录/注册</div>
    <input id="login-username" placeholder="请输入账号" type="text">
    <input id="login-password" placeholder="请输入密码" type="password">
    <button onclick="handleRegister()">注册账号</button>
    <button onclick="handleLogin()">登录账号</button>
  </div>
</div>

<!-- 游戏主界面 -->
<div class="container" id="gameContainer" style="display:none;">
  <div class="top-bar">
    <div class="info">
      <div>玩家：<span id="game-username">未知</span></div>
      <div>区服：<span id="game-server">1服</span></div>
      <div>等级：<span id="game-level">1</span></div>
      <div class="exp-bar"><div class="fill" id="game-expBar"></div></div>
    </div>
    <div class="btns">
      <button onclick="checkUpdate(true)">检查更新</button>
      <button onclick="openRank()">排行榜</button>
      <button onclick="openGM()">GM后台</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('main')">主页</button>
    <button class="tab" onclick="switchTab('bag')">背包</button>
    <button class="tab" onclick="switchTab('role')">人物</button>
  </div>

  <div class="content">
    <div class="page active" id="main">
      <div class="card">
        <div>金币：<span id="game-gold">0</span></div>
        <div>战力：<span id="game-power">0</span></div>
        <button onclick="addGold()">金币 +1000</button>
        <button onclick="saveToCloud()">云端存档</button>
      </div>
    </div>
    <div class="page" id="bag">背包功能（开发中）</div>
    <div class="page" id="role">人物属性（开发中）</div>
  </div>

  <div class="log" id="game-log"></div>
</div>

<!-- 排行榜弹窗 -->
<div id="rankModal" class="modal">
  <div class="modal-box">
    <div class="title">全服战力排行</div>
    <div id="rankList"></div>
    <button onclick="closeModal('rankModal')">关闭</button>
  </div>
</div>

<!-- GM后台弹窗 -->
<div id="gmModal" class="modal">
  <div class="modal-box">
    <div class="title">GM管理后台</div>
    <input id="gm-password" placeholder="输入GM密码" type="password">
    <button onclick="gmCommand('gold')">金币 +10万</button>
    <button onclick="gmCommand('level')">等级 +10</button>
    <button onclick="closeModal('gmModal')">关闭</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
