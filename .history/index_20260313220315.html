<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洪荒五行MUD - 在线正式服</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 自动更新弹窗 -->
<div id="updateModal" class="modal">
  <div class="modal-box">
    <div class="title">发现游戏更新</div>
    <div id="updateMsg">正在更新，请稍候...</div>
    <button onclick="location.reload()">立即更新</button>
  </div>
</div>

<!-- 登录注册弹窗 -->
<div id="loginModal" class="modal">
  <div class="modal-box">
    <div class="title">账号登录</div>
    <input id="user" placeholder="请输入账号" type="text">
    <input id="pwd" placeholder="请输入密码" type="password">
    <button onclick="login()">登录</button>
    <button onclick="register()">注册</button>
  </div>
</div>

<!-- 主容器 -->
<div class="container" id="gameBox" style="display:none;">
  <div class="top-bar">
    <div class="info">
      <div class="name">玩家：<span id="username"></span></div>
      <div>区服：<span id="serverId">1服</span></div>
      <div>等级：<span id="level">1</span></div>
      <div class="exp-bar"><div class="fill" id="expFill"></div></div>
    </div>
    <div class="btn-group">
      <button onclick="checkUpdate(true)">检查更新</button>
      <button onclick="openRank()">排行榜</button>
      <button onclick="openGM()">GM后台</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="tab('main')">主页</button>
    <button class="tab" onclick="tab('bag')">背包</button>
    <button class="tab" onclick="tab('role')">人物</button>
  </div>

  <div class="content">
    <div class="page active" id="main">
      <div class="card">
        <div>金币：<span id="gold">0</span></div>
        <div>战力：<span id="power">0</span></div>
        <button onclick="addGold()">金币+1000</button>
        <button onclick="saveCloud()">云端存档</button>
      </div>
    </div>
    <div class="page" id="bag">背包功能</div>
    <div class="page" id="role">人物属性</div>
  </div>

  <div class="log" id="log"></div>
</div>

<!-- 排行榜弹窗 -->
<div id="rankModal" class="modal">
  <div class="modal-box">
    <div class="title">战力排行榜</div>
    <div id="rankList"></div>
    <button onclick="closeModal('rankModal')">关闭</button>
  </div>
</div>

<!-- GM后台 -->
<div id="gmModal" class="modal">
  <div class="modal-box">
    <div class="title">GM管理后台</div>
    <input id="gmPwd" placeholder="GM密码" type="password">
    <button onclick="gmCmd('gold')">金币+10万</button>
    <button onclick="gmCmd('level')">等级+10</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
