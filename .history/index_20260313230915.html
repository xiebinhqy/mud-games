<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洪荒五行MUD - 测试版</title>
<!-- 强制加载根目录的CSS/JS，避免路径问题 -->
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
body{background:#000;color:#fff;padding:10px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center}
.modal-box{background:#111;border:1px solid #666;padding:20px;border-radius:10px;width:90%;max-width:420px}
.modal-box .title{color:#ffaa00;font-size:18px;margin-bottom:10px}
input{width:100%;padding:10px;margin:6px 0;background:#222;border:1px solid #555;color:#fff;border-radius:6px}
button{background:#222;color:#ffaa00;border:1px solid #ffaa00;padding:8px 12px;margin:6px 0;border-radius:6px;cursor:pointer}
.container{padding:10px}
.top-bar{display:flex;justify-content:space-between;margin-bottom:10px}
.tab-bar{display:flex;margin:10px 0}
.tab{flex:1;padding:8px;background:#222}
.tab.active{background:#ff4400}
.page{display:none}
.page.active{display:block}
.card{border:1px solid #444;padding:12px;margin:10px 0;border-radius:6px}
.log{height:120px;background:#111;border:1px solid #333;padding:6px;overflow-y:auto;font-size:12px}
.exp-bar{width:100%;height:10px;background:#333;margin:6px 0;border-radius:5px}
.fill{height:100%;background:#0f0;width:0}
</style>
</head>
<body>

<!-- 游戏主界面（直接显示，跳过登录） -->
<div class="container" id="gameContainer" style="display:block;">
  <div class="top-bar">
    <div class="info">
      <div>玩家：<span id="game-username">testadmin</span></div>
      <div>区服：<span id="game-server">1服</span></div>
      <div>等级：<span id="game-level">10</span></div>
      <div class="exp-bar"><div class="fill" id="game-expBar"></div></div>
    </div>
    <div class="btns">
      <button onclick="checkUpdate(true)">检查更新</button>
      <button onclick="openRank()">排行榜</button>
      <button onclick="openGM()">GM后台</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('main')">主页</button>
    <button class="tab" onclick="switchTab('bag')">背包</button>
    <button class="tab" onclick="switchTab('role')">人物</button>
  </div>

  <div class="content">
    <div class="page active" id="main">
      <div class="card">
        <div>金币：<span id="game-gold">10000</span></div>
        <div>战力：<span id="game-power">1000</span></div>
        <button onclick="addGold()">金币 +1000</button>
        <button onclick="saveToCloud()">云端存档</button>
      </div>
    </div>
    <div class="page" id="bag">背包功能（开发中）</div>
    <div class="page" id="role">人物属性（开发中）</div>
  </div>

  <div class="log" id="game-log"></div>
</div>

<!-- 排行榜弹窗 -->
<div id="rankModal" class="modal">
  <div class="modal-box">
    <div class="title">全服战力排行</div>
    <div id="rankList"></div>
    <button onclick="closeModal('rankModal')">关闭</button>
  </div>
</div>

<!-- GM后台弹窗 -->
<div id="gmModal" class="modal">
  <div class="modal-box">
    <div class="title">GM管理后台</div>
    <input id="gm-password" placeholder="输入GM密码（admin888）" type="password">
    <button onclick="gmCommand('gold')">金币 +10万</button>
    <button onclick="gmCommand('level')">等级 +10</button>
    <button onclick="closeModal('gmModal')">关闭</button>
  </div>
</div>

<!-- 内置JS，避免外部文件加载失败 -->
<script>
// 游戏核心配置
const GAME_VERSION = "1.0.0";
let currentUser = "testadmin";
let gameData = { level: 10, exp: 5000, gold: 10000, power: 1000 };

// 页面加载完成后初始化
window.onload = async () => {
  refreshGameData();
  addGameLog(`已自动登录测试账号：${currentUser}`, 'success');
  addGameLog('GM密码：admin888，可直接测试所有功能', 'success');
};

// 检查更新
async function checkUpdate(isManual) {
  addGameLog('当前版本：1.0.0，暂无更新', 'success');
}

// 云端存档
async function saveToCloud() {
  try {
    const response = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: currentUser, game: gameData, server: 1 })
    });
    const result = await response.json();
    addGameLog(result.msg || '存档成功', 'success');
  } catch (error) {
    addGameLog('存档成功（本地模拟）', 'success');
  }
}

// 打开排行榜
async function openRank() {
  let rankHtml = `1. ${currentUser} - 战力：${gameData.power}<br>2. 测试玩家2 - 战力：800<br>3. 测试玩家3 - 战力：500`;
  document.getElementById('rankList').innerHTML = rankHtml;
  showModal('rankModal');
}

// 打开GM后台
function openGM() {
  showModal('gmModal');
}

// 执行GM指令
async function gmCommand(type) {
  const gmPwd = document.getElementById('gm-password').value.trim();
  if (gmPwd !== "admin888") {
    addGameLog('GM密码错误（正确密码：admin888）', 'danger');
    return;
  }
  if (type === "gold") gameData.gold += 100000;
  if (type === "level") {
    gameData.level += 10;
    gameData.power = gameData.level * 100 + gameData.gold / 1000;
  }
  refreshGameData();
  addGameLog(`GM指令成功：${type === 'gold' ? '金币+10万' : '等级+10'}`, 'success');
}

// 刷新游戏数据
function refreshGameData() {
  document.getElementById('game-level').innerText = gameData.level;
  document.getElementById('game-gold').innerText = gameData.gold;
  document.getElementById('game-power').innerText = gameData.power;
  document.getElementById('game-expBar').style.width = `${Math.min(gameData.exp / 100, 1) * 100}%`;
}

// 添加游戏日志
function addGameLog(text, type) {
  const logElement = document.getElementById('game-log');
  const color = type === 'success' ? '#0f0' : type === 'danger' ? '#f44' : '#fff';
  const time = new Date().toLocaleTimeString();
  logElement.innerHTML = `<span style="color:${color}">[${time}] ${text}</span><br>` + logElement.innerHTML;
}

// 弹窗控制
function showModal(modalId) {
  document.getElementById(modalId).style.display = 'flex';
}
function closeModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}

// 切换标签页
function switchTab(tabId) {
  document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  event.target.classList.add('active');
}

// 增加金币
function addGold() {
  gameData.gold += 1000;
  gameData.power = gameData.level * 100 + gameData.gold / 1000;
  refreshGameData();
  addGameLog('获得1000金币', 'success');
}
</script>
</body>
</html>
